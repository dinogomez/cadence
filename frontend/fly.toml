# fly.toml — Cadence frontend
app = "cadence-frontend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    VITE_API_URL = "https://cadence-backend.fly.dev"
    VITE_WS_URL = "wss://cadence-backend.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
